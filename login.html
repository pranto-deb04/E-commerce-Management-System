<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Login-Sapran Cart</title>
</head>

<body
    style="background: #1e293b; padding: auto; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff;">

    <div
        style="background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); width: 100%; max-width: 400px; border: 1px solid rgba(56, 189, 248, 0.2)">

        <div style="text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 8px;">
            <span style="color: #38bdf8;">Sapran</span>Cart
        </div>
        <div style="text-align: center; font-size: 14px; color: #94a3b8; margin-bottom: 30px;">
            Welcome Back! Log in your account
        </div>

        <form action="login.php" method="POST">

            <div style="margin-bottom: 20px;">
                <label for="role" style="display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Select
                    Role</label>
                <select id="role" name="role"
                    style="width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box; cursor: pointer;">
                    <option value="customer" style="background: #1e293b;">Customer</option>
                    <option value="admin" style="background: #1e293b;">Admin</option>
                    <option value="owner" style="background: #1e293b;">Owner</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="email" style="display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Email
                    Address</label>
                <input type="email" id="email" name="email" placeholder="enter your email" required
                    style="width: 100%;padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 15px; outline: none;box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="password"
                    style="display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Password</label>
                <input type="password" id="password" name="password" placeholder="...................." required
                    style="width: 100%; padding: 12px 16px;background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box;">
            </div>

            <div
                style="display: flex; justify-content: space-between; align-items: center; font-size: 14px; margin-bottom: 25px;">
                <label style="display: flex; align-items: center; gap: 6px; color: #94a3b8; cursor: pointer;">
                    <input type="checkbox" name="remember_me"> Remember me
                </label>
                <a href="#" style="color: #38bdf8; text-decoration: none;">Forget Password</a>
            </div>

            <button type="submit"
                style="width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 8px; color: #0f172a; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;">
                Log in
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px; color: #94a3b8;">
            Don't have account <a href="register.html"
                style="color: #38bdf8; text-decoration: none; font-weight: bold;">Register Here</a>
        </div>
    </div>

</body>

</html>
