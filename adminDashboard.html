<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Shopping - Admin Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #ffffff;
    }

    header {
      background-color: #1e293b;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #38bdf8;
      text-decoration: none;
    }

    .user-info {
      color: #94a3b8;
      font-style: italic;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn-add {
      background-color: #38bdf8;
      color: #0f172a;
    }

    .btn-add:hover {
      background-color: #7dd3fc;
    }

    .btn-cancel {
      background-color: #334155;
      color: #94a3b8;
    }

    .btn-cancel:hover {
      background-color: #475569;
    }

    .btn-save {
      background-color: #38bdf8;
      color: #0f172a;
    }

    .btn-save:hover {
      background-color: #7dd3fc;
    }

    .btn-delete {
      background-color: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-delete:hover {
      background-color: #ef4444;
      color: white;
    }

    .table-wrapper {
      background-color: #1e293b;
      border-radius: 8px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #334155;
    }

    th {
      background-color: #0f172a;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .empty-msg {
      text-align: center;
      color: #64748b;
      padding: 40px;
      font-style: italic;
    }

    .stock-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-stock {
      width: 30px;
      height: 30px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #ffffff;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .btn-stock:hover {
      border-color: #38bdf8;
      color: #38bdf8;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-content {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .modal-content h3 {
      margin-bottom: 20px;
      color: #ffffff;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #94a3b8;
      font-size: 14px;
    }

    .form-control {
      width: 100%;
      padding: 10px;
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #ffffff;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .form-control:focus {
      border-color: #38bdf8;
    }
  </style>
</head>

<body>

  <header>
    <a href="#" class="logo">E-Shopping</a>
    <div class="user-info">Connecting to database...</div>
  </header>

  <div class="container">
    <div class="header-area">
      <h2>Product Management</h2>
      <button class="btn btn-add" onclick="openModal()">+ Add New Product</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Price</th>
            <th>Stock Qty</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="product-list">
          <tr id="no-data-row">
            <td colspan="4" class="empty-msg">No products found. Database not connected.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="productModal">
    <div class="modal-content">
      <h3>Add New Product</h3>
      <form onsubmit="saveProduct(event)">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="pName" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" id="pPrice" class="form-control" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" id="pStock" class="form-control" required>
        </div>
        <div style="text-align: right; margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
          <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let idCounter = 0;

    function openModal() {
      document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('productModal').style.display = 'none';
    }

    function changeStock(id, amount) {
      const stockText = document.getElementById(id);
      let currentStock = parseInt(stockText.textContent);
      if (currentStock + amount >= 0) {
        stockText.textContent = currentStock + amount;
      }
    }

    function deleteProduct(button) {
      if (confirm("Are you sure?")) {
        button.parentElement.parentElement.remove();

        const tableBody = document.getElementById('product-list');
        if (tableBody.children.length === 0) {
          tableBody.innerHTML = `<tr id="no-data-row"><td colspan="4" class="empty-msg">No products found. Database not connected.</td></tr>`;
        }
      }
    }

    function saveProduct(event) {
      event.preventDefault();

      const name = document.getElementById('pName').value;
      const price = parseFloat(document.getElementById('pPrice').value).toFixed(2);
      const stock = document.getElementById('pStock').value;

      idCounter++;
      const stockId = 'stock-num-' + idCounter;

      const tableBody = document.getElementById('product-list');

      const noDataRow = document.getElementById('no-data-row');
      if (noDataRow) { noDataRow.remove(); }

      const newRow = document.createElement('tr');
      newRow.innerHTML = `
                <td><b>${name}</b></td>
                <td style="color: #38bdf8; font-weight: bold;">$${price}</td>
                <td>
                    <div class="stock-box">
                        <button class="btn-stock" onclick="changeStock('${stockId}', -1)">-</button>
                        <span id="${stockId}">${stock}</span>
                        <button class="btn-stock" onclick="changeStock('${stockId}', 1)">+</button>
                    </div>
                </td>
                <td><button class="btn-delete" onclick="deleteProduct(this)">Delete</button></td>
            `;

      tableBody.appendChild(newRow);
      closeModal();
      event.target.reset();
    }
  </script>
</body>

</html>
