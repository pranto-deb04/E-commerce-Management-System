<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Shopping - Add New Product</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #1e293b;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #38bdf8;
      text-decoration: none;
    }

    .btn-back {
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      color: #38bdf8;
      border: 2px solid #38bdf8;
      transition: all 0.3s ease;
    }

    .btn-back:hover {
      background-color: #38bdf8;
      color: #0f172a;
    }

    .form-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .form-card {
      background-color: #1e293b;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
    }

    .form-card h2 {
      color: #ffffff;
      margin-bottom: 25px;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #94a3b8;
      font-size: 14px;
    }

    .form-control {
      width: 100%;
      padding: 12px;
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      font-size: 15px;
      color: #ffffff;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .form-control:focus {
      border-color: #38bdf8;
    }

    select.form-control option {
      background-color: #1e293b;
      color: #ffffff;
    }

    .form-row {
      display: flex;
      gap: 15px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background-color: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-top: 10px;
    }

    .btn-submit:hover {
      background-color: #7dd3fc;
    }
  </style>
</head>

<body>

  <header>
    <a href="#" class="logo">E-Shopping</a>
    <a href="admin_dashboard.html" class="btn-back">Back to Dashboard</a>
  </header>

  <div class="form-container">
    <div class="form-card">
      <h2>Add New Product</h2>

      <form action="AddProductServlet" method="POST">
        <div class="form-group">
          <label for="productName">Product Name</label>
          <input type="text" id="productName" name="productName" class="form-control" placeholder="Enter product name"
            required>
        </div>

        <div class="form-group">
          <label for="productCategory">Category</label>
          <select id="productCategory" name="productCategory" class="form-control" required>
            <option value="" disabled selected>Select category</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="gadgets">Gadgets</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>

        <div class="form-group">
          <label for="productPrice">Price ($)</label>
          <input type="number" id="productPrice" name="productPrice" class="form-control" placeholder="0.00" step="0.01"
            required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="productStock">Initial Stock Status</label>
            <select id="productStock" name="productStock" class="form-control" required>
              <option value="in_stock">In Stock</option>
              <option value="out_of_stock">Out of Stock</option>
            </select>
          </div>

          <div class="form-group">
            <label for="productQuantity">Quantity</label>
            <input type="number" id="productQuantity" name="productQuantity" class="form-control" placeholder="e.g. 50"
              min="0" required>
          </div>
        </div>

        <button type="submit" class="btn-submit">Save to Database</button>
      </form>
    </div>
  </div>

</body>

</html>
