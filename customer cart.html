<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Sapran Cart</title>
</head>
<body style="margin: 0; padding: 20px; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff;">

    <!-- মেইন কন্টেইনার (কার্ট পেজ) -->
    <div style="max-width: 1100px; margin: 40px auto; padding: 20px;">
        
        <!-- হেডিং -->
        <h1 style="font-size: 28px; margin-bottom: 30px; border-bottom: 2px solid rgba(56, 189, 248, 0.2); padding-bottom: 10px;">
            Shopping <span style="color: #38bdf8;">Cart</span>
        </h1>

        <!-- কার্ট লেআউট -->
        <div style="display: flex; flex-wrap: wrap; gap: 30px;">
            
            <!-- বাম পাশ: প্রোডাক্ট লিস্ট -->
            <div style="flex: 2; min-width: 300px;">
                
                <!-- প্রোডাক্ট আইটেম ১ (Gaming Mouse) -->
                <div class="cart-item" data-price="25" style="display: flex; align-items: center; background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(56, 189, 248, 0.1); flex-wrap: wrap; gap: 15px;">
                    <div style="width: 80px; height: 80px; background: #334155; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #94a3b8;">Image</div>
                    
                    <div style="flex: 1; min-width: 150px;">
                        <h3 style="margin: 0 0 5px 0; font-size: 18px; color: #fff;">Gaming Mouse RGB</h3>
                        <p style="margin: 0; font-size: 14px; color: #94a3b8;">Category: Gadgets</p>
                    </div>

                    <!-- পরিমাণ নিয়ন্ত্রণ (Quantity) -->
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button onclick="changeQuantity(this, -1)" style="background: #334155; border: none; color: #fff; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; font-weight: bold;">-</button>
                        <span class="quantity" style="font-size: 16px; font-weight: bold; width: 20px; text-align: center;">1</span>
                        <button onclick="changeQuantity(this, 1)" style="background: #334155; border: none; color: #fff; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; font-weight: bold;">+</button>
                    </div>

                    <!-- ডাইনামিক প্রাইস -->
                    <div style="font-size: 18px; font-weight: bold; color: #38bdf8; min-width: 80px; text-align: right;">
                        $<span class="item-total">25.00</span>
                    </div>

                    <button style="background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 14px; font-weight: bold; padding: 5px;">Remove</button>
                </div>

                <!-- প্রোডাক্ট আইটেম ২ (Mechanical Keyboard) -->
                <div class="cart-item" data-price="45" style="display: flex; align-items: center; background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(56, 189, 248, 0.1); flex-wrap: wrap; gap: 15px;">
                    <div style="width: 80px; height: 80px; background: #334155; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #94a3b8;">Image</div>
                    
                    <div style="flex: 1; min-width: 150px;">
                        <h3 style="margin: 0 0 5px 0; font-size: 18px; color: #fff;">Mechanical Keyboard</h3>
                        <p style="margin: 0; font-size: 14px; color: #94a3b8;">Category: Gadgets</p>
                    </div>

                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button onclick="changeQuantity(this, -1)" style="background: #334155; border: none; color: #fff; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; font-weight: bold;">-</button>
                        <span class="quantity" style="font-size: 16px; font-weight: bold; width: 20px; text-align: center;">1</span>
                        <button onclick="changeQuantity(this, 1)" style="background: #334155; border: none; color: #fff; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; font-weight: bold;">+</button>
                    </div>

                    <div style="font-size: 18px; font-weight: bold; color: #38bdf8; min-width: 80px; text-align: right;">
                        $<span class="item-total">45.00</span>
                    </div>

                    <button style="background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 14px; font-weight: bold; padding: 5px;">Remove</button>
                </div>

            </div>

            <!-- ডানে পাশ: অর্ডার সামারি -->
            <div style="flex: 1; min-width: 300px;">
                <div style="background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.2); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);">
                    <h2 style="margin-top: 0; font-size: 22px; margin-bottom: 20px; color: #fff;">Order Summary</h2>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; color: #94a3b8;">
                        <span>Subtotal</span>
                        <span>$<span id="subtotal">70.00</span></span>
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; color: #94a3b8;">
                        <span>Shipping Fee</span>
                        <span>$5.00</span>
                    </div>

                    <hr style="border: 0; border-top: 1px solid #334155; margin-bottom: 20px;">

                    <div style="display: flex; justify-content: space-between; margin-bottom: 30px; font-size: 20px; font-weight: bold; color: #fff;">
                        <span>Total</span>
                        <span style="color: #38bdf8;">$<span id="total">75.00</span></span>
                    </div>

                    <button style="width: 100%; padding: 14px; background: #38bdf8; border: none; border-radius: 8px; color: #0f172a; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;">
                        Proceed to Checkout
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- ক্যালকুলেশনের জন্য ছোট জাভাস্ক্রিপ্ট কোড -->
    <script>
        function changeQuantity(button, change) {
            // বাটন থেকে মেইন প্রোডাক্ট কন্টেইনার খুঁজে বের করা
            const item = button.closest('.cart-item');
            const basePrice = parseFloat(item.getAttribute('data-price'));
            const quantityElement = item.querySelector('.quantity');
            const itemTotalElement = item.querySelector('.item-total');
            
            // বর্তমান কোয়ান্টিটি আপডেট করা
            let currentQuantity = parseInt(quantityElement.innerText);
            currentQuantity += change;
            
            // কোয়ান্টিটি যেন ১ এর নিচে না যায়
            if (currentQuantity < 1) currentQuantity = 1;
            
            // পেজে নতুন কোয়ান্টিটি ও গুণফল প্রাইজ বসানো
            quantityElement.innerText = currentQuantity;
            itemTotalElement.innerText = (basePrice * currentQuantity).toFixed(2);
            
            // পুরো কার্টের সাবটোটাল এবং সর্বমোট হিসাব আপডেট করা
            updateOrderSummary();
        }

        function updateOrderSummary() {
            let subtotal = 0;
            // প্রতিটি প্রোডাক্টের মোট দাম যোগ করা
            document.querySelectorAll('.cart-item').forEach(item => {
                const itemTotal = parseFloat(item.querySelector('.item-total').innerText);
                subtotal += itemTotal;
            });
            
            const shippingFee = 5.00;
            const total = subtotal + shippingFee;
            
            // ডানপাশের বক্সে আপডেট করা
            document.getElementById('subtotal').innerText = subtotal.toFixed(2);
            document.getElementById('total').innerText = total.toFixed(2);
        }
    </script>

</body>
</html>
