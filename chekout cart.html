<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Sapran Cart</title>
</head>
<body style="margin: 0; padding: 20px; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff;">


    <div style="max-width: 1100px; margin: 40px auto; padding: 20px;">
        
        <!-- হেডিং -->
        <h1 style="font-size: 28px; margin-bottom: 30px; border-bottom: 2px solid rgba(56, 189, 248, 0.2); padding-bottom: 10px;">
            Secure <span style="color: #38bdf8;">Checkout</span>
        </h1>

        
        <div style="display: flex; flex-wrap: wrap; gap: 30px;">
            
            <!-- বাম পাশ: শিপিং ও বিলিং ফর্ম -->
            <div style="flex: 2; min-width: 300px; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.1);">
                <h2 style="margin-top: 0; font-size: 20px; margin-bottom: 20px; color: #38bdf8;">Shipping Information</h2>
                
                <form action="#">
                    
                    <div style="margin-bottom: 20px;">
                        <label for="fullname" style="display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Full Name</label>
                        <input type="text" id="fullname" placeholder="John Doe" required 
                               style="width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box;">
                    </div>

                
                    <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 200px;">
                            <label for="phone" style="display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Phone Number</label>
                            <input type="tel" id="phone" placeholder="017XXXXXXXX" required 
                                   style="width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box;">
                        </div>
                        <div style="flex: 1; min-width: 200px;">
                            <label for="email" style="display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Email Address</label>
                            <input type="email" id="email" placeholder="john@example.com" required 
                                   style="width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box;">
                        </div>
                    </div>

                
                    <div style="margin-bottom: 20px;">
                        <label for="address" style="display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Street Address</label>
                        <input type="text" id="address" placeholder="House no, Road no, Area..." required 
                               style="width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box;">
                    </div>

                
                    <div style="display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 200px;">
                            <label for="city" style="display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">City</label>
                            <input type="text" id="city" placeholder="Dhaka" required 
                                   style="width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box;">
                        </div>
                        <div style="flex: 1; min-width: 200px;">
                            <label for="zip" style="display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">Postal / ZIP Code</label>
                            <input type="text" id="zip" placeholder="1212" required 
                                   style="width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box;">
                        </div>
                    </div>
                </form>
            </div>

                        <div style="flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px;">
                
            
                <div style="background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.1);">
                    <h2 style="margin-top: 0; font-size: 18px; margin-bottom: 15px; color: #fff;">Your Order</h2>
                    
            
                    <div style="display: flex; justify-content: space-between; font-size: 14px; color: #94a3b8; margin-bottom: 10px;">
                        <span>Gaming Mouse RGB × 1</span>
                        <span style="color: #fff;">$25.00</span>
                    </div>
                    <!-- আইটেম ২ -->
                    <div style="display: flex; justify-content: space-between; font-size: 14px; color: #94a3b8; margin-bottom: 15px;">
                        <span>Mechanical Keyboard × 1</span>
                        <span style="color: #fff;">$45.00</span>
                    </div>

                    <hr style="border: 0; border-top: 1px solid #334155; margin-bottom: 15px;">
                    
            
                    <div style="display: flex; justify-content: space-between; font-size: 14px; color: #94a3b8; margin-bottom: 8px;">
                        <span>Subtotal</span>
                        <span>$70.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 14px; color: #94a3b8; margin-bottom: 15px;">
                        <span>Shipping Fee</span>
                        <span>$5.00</span>
                    </div>

                    <hr style="border: 0; border-top: 1px solid #334155; margin-bottom: 15px;">

                    <!-- টোটাল -->
                    <div style="display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; color: #fff;">
                        <span>Total</span>
                        <span style="color: #38bdf8;">$75.00</span>
                    </div>
                </div>

             
                <div style="background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.2); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);">
                    <h2 style="margin-top: 0; font-size: 18px; margin-bottom: 15px; color: #fff;">Payment Method</h2>
                    
             
                    <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; margin-bottom: 12px; cursor: pointer;">
                        <input type="radio" name="payment" checked style="accent-color: #38bdf8;">
                        <div>
                            <span style="display: block; font-size: 15px; font-weight: bold;">Cash on Delivery (COD)</span>
                            <span style="font-size: 12px; color: #94a3b8;">Pay with cash upon delivery.</span>
                        </div>
                    </label>

             
                    <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; margin-bottom: 25px; cursor: pointer;">
                        <input type="radio" name="payment" style="accent-color: #38bdf8;">
                        <div>
                            <span style="display: block; font-size: 15px; font-weight: bold;">Online Payment</span>
                            <span style="font-size: 12px; color: #94a3b8;">Bkash, Nagad, Rocket or Credit Card</span>
                        </div>
                    </label>

                    <!-- অর্ডার প্লেস বাটন -->
                    <button type="submit" style="width: 100%; padding: 14px; background: #38bdf8; border: none; border-radius: 8px; color: #0f172a; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;">
                        Place Order ($75.00)
                    </button>
                </div>

            </div>

        </div>
    </div>

</body>
</html>
